name: skill-index

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerar índice
        run: python3 scripts/generate_skill_index.py
      - name: Verificar SKILL_INDEX.md atualizado
        run: |
          git diff --exit-code SKILL_INDEX.md || {
            echo "::error::SKILL_INDEX.md desatualizado. Execute: python3 scripts/generate_skill_index.py"
            exit 1
          }
